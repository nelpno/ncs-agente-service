services:
  ncs-agente:
    image: ghcr.io/nelpno/ncs-agente-service:latest
    container_name: ncs-agente
    restart: unless-stopped
    pull_policy: always
    environment:
      - PORT=8080
      # Modelo (OpenRouter OU Google direto via endpoint OpenAI-compatible)
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_BASE_URL=${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      - AGENT_MODEL=${AGENT_MODEL:-google/gemini-2.5-flash}
      # Octadesk
      - OCTADESK_BASE_URL=${OCTADESK_BASE_URL:-https://o222276-30e.api002.octadesk.services}
      - OCTADESK_API_KEY=${OCTADESK_API_KEY}
      - OCTADESK_SUBDOMAIN=${OCTADESK_SUBDOMAIN:-o222276-30e}
      - OCTADESK_AGENT_EMAIL=${OCTADESK_AGENT_EMAIL}
      # Superlógica (somente leitura no piloto)
      - SUPERLOGICA_APP_TOKEN=${SUPERLOGICA_APP_TOKEN}
      - SUPERLOGICA_ACCESS_TOKEN=${SUPERLOGICA_ACCESS_TOKEN}
      # segurança
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - CHAT_PASSCODE=${CHAT_PASSCODE}
      - DRY_RUN_WRITES=true
      - LOG_PII=false
      # Redis (memória persistente de sessão — opcional; fallback in-memory se ausente)
      - REDIS_URL=${REDIS_URL:-}
      - SESSION_TTL_S=${SESSION_TTL_S:-172800}
      # Write-tools (motor de escritas — rollout DRY_RUN)
      - AUDIT_LOG_PATH=${AUDIT_LOG_PATH:-/data/audit/escritas.jsonl}
      - APPROVAL_PASSCODE=${APPROVAL_PASSCODE:-}
      - APPROVAL_TTL_H=${APPROVAL_TTL_H:-}
      - ADAPTER_NOTIFY_URL=${ADAPTER_NOTIFY_URL:-}
      - SUPERLOGICA_WRITE_APP_TOKEN=${SUPERLOGICA_WRITE_APP_TOKEN:-}
      - SUPERLOGICA_WRITE_ACCESS_TOKEN=${SUPERLOGICA_WRITE_ACCESS_TOKEN:-}
    volumes:
      - ncs_agente_audit_data:/data/audit
    depends_on:
      - redis
    expose:
      - "8080"
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  # Redis: memória de sessão persistente da Ana (sobrevive a redeploy e ao recontato de 62%).
  # Fica na mesma rede da stack → hostname "redis" resolve. Volume nomeado persiste entre recriações.
  redis:
    image: redis:7-alpine
    container_name: ncs-agente-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "volatile-ttl"]
    volumes:
      - ncs_agente_redis_data:/data
    expose:
      - "6379"
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  # Cloudflare Tunnel: expõe o agente em HTTPS sem abrir porta.
  # Crie o túnel no painel Cloudflare (Zero Trust > Tunnels), pegue o token e ponte para http://ncs-agente:8080.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: ncs-agente-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - ncs-agente
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

volumes:
  ncs_agente_redis_data:
  ncs_agente_audit_data:

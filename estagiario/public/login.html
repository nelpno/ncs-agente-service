<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Entrar — NCS</title>
<style>
  /* Padrão CLARO. Escuro só quando a pessoa escolhe (data-theme="dark", lembrado). */
  :root{
    --olive:#8f8a00; --olive-d:#726d00; --lime:#aeb830; --lime-soft:#eef0d8;
    --bg:#f4f5ee; --card:#ffffff; --ink:#2a2a1e; --muted:#6b6b5a; --line:#e2e3d5;
    --shadow:0 10px 34px rgba(90,88,20,.12);
  }
  :root[data-theme="dark"]{
    --olive:#bcc766; --olive-d:#aeb830; --lime:#bcc766; --lime-soft:#2c2d1e;
    --bg:#16160f; --card:#20201a; --ink:#ececdf; --muted:#a3a390; --line:#33332a;
    --shadow:0 10px 34px rgba(0,0,0,.5);
  }
  *{box-sizing:border-box;font-family:'Segoe UI',system-ui,Roboto,Arial,sans-serif}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden}
  /* arcos concêntricos (marca) ao fundo */
  body::before{content:"";position:absolute;width:900px;height:900px;border-radius:50%;
    border:60px solid var(--lime-soft);top:-380px;right:-300px;opacity:.6;z-index:0}
  body::after{content:"";position:absolute;width:600px;height:600px;border-radius:50%;
    border:44px solid var(--lime-soft);bottom:-320px;left:-260px;opacity:.5;z-index:0}

  .theme{position:absolute;top:16px;right:18px;z-index:3;background:var(--card);border:1px solid var(--line);
    color:var(--ink);width:40px;height:40px;border-radius:50%;cursor:pointer;font-size:17px;box-shadow:var(--shadow)}

  .card{position:relative;z-index:2;background:var(--card);border:1px solid var(--line);border-radius:20px;
    box-shadow:var(--shadow);width:100%;max-width:400px;padding:34px 30px 28px}
  .logo{width:62px;height:62px;border-radius:16px;margin:0 auto 14px;
    background:linear-gradient(150deg,var(--olive),var(--olive-d));display:flex;align-items:center;justify-content:center;
    color:#fff;font-weight:800;font-size:20px;letter-spacing:.5px;box-shadow:0 6px 16px rgba(114,109,0,.35)}
  h1{font-size:21px;text-align:center;margin:0 0 4px;font-weight:700}
  .sub{text-align:center;color:var(--muted);font-size:13.5px;margin:0 0 22px;line-height:1.45}

  label{display:block;font-size:12.5px;font-weight:700;color:var(--muted);margin:0 0 6px}
  .field{margin-bottom:15px}
  .inwrap{position:relative}
  input{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:11px;font-size:15px;
    background:var(--bg);color:var(--ink);outline:none;transition:.15s;font-family:inherit}
  input:focus{border-color:var(--olive);box-shadow:0 0 0 3px rgba(143,138,0,.14)}
  .eye{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;
    font-size:16px;color:var(--muted);padding:4px}
  button.go{width:100%;margin-top:6px;padding:12px;border:none;border-radius:11px;cursor:pointer;
    background:linear-gradient(150deg,var(--lime),var(--olive));color:#25260c;font-weight:800;font-size:15px;
    box-shadow:0 6px 16px rgba(143,138,0,.3);transition:.15s}
  button.go:hover{transform:translateY(-1px)}button.go:disabled{opacity:.55;cursor:default;transform:none}
  .msg{margin-top:14px;font-size:13px;text-align:center;min-height:18px}
  .msg.err{color:#b23a2e}.msg.ok{color:var(--olive-d)}
  .foot{margin-top:20px;text-align:center;font-size:11.5px;color:var(--muted);line-height:1.5}
</style>
</head>
<body>
  <button class="theme" id="theme" title="Alternar tema">🌙</button>
  <form class="card" id="form" autocomplete="on">
    <div class="logo">NCS</div>
    <h1 id="title">Entrar</h1>
    <p class="sub" id="sub">Acesso interno da equipe do Grupo NCS.</p>

    <div class="field" id="emailField">
      <label for="email">E-mail</label>
      <input type="email" id="email" placeholder="voce@gruponcs.net" autocomplete="username" required>
    </div>
    <div class="field">
      <label for="senha" id="senhaLabel">Senha</label>
      <div class="inwrap">
        <input type="password" id="senha" placeholder="Sua senha" autocomplete="current-password" required>
        <button type="button" class="eye" id="eye" title="Mostrar/ocultar">👁</button>
      </div>
    </div>
    <button type="submit" class="go" id="go">Entrar</button>
    <div class="msg" id="msg"></div>
    <div class="foot">Uso interno · Grupo NCS · Administração de condomínios</div>
  </form>

<script>
(function(){
  // ---- tema: padrão CLARO; só vai pro escuro se a pessoa escolheu antes ----
  var root=document.documentElement;
  if(localStorage.getItem('ncs_theme')==='dark') root.setAttribute('data-theme','dark');
  function syncIcon(){document.getElementById('theme').textContent=root.getAttribute('data-theme')==='dark'?'☀️':'🌙';}
  syncIcon();
  document.getElementById('theme').onclick=function(){
    var dark=root.getAttribute('data-theme')==='dark';
    if(dark){root.removeAttribute('data-theme');localStorage.setItem('ncs_theme','light');}
    else{root.setAttribute('data-theme','dark');localStorage.setItem('ncs_theme','dark');}
    syncIcon();
  };

  // ---- modo: login (padrão) ou ativação (?t=<token>) ----
  var token=new URLSearchParams(location.search).get('t');
  var ativar=!!token;
  if(ativar){
    document.getElementById('title').textContent='Criar sua senha';
    document.getElementById('sub').textContent='Bem-vindo(a)! Defina a senha do seu acesso para continuar.';
    document.getElementById('emailField').style.display='none';
    document.getElementById('email').required=false;
    document.getElementById('senhaLabel').textContent='Escolha uma senha (mínimo 8 caracteres)';
    document.getElementById('senha').placeholder='Crie uma senha';
    document.getElementById('senha').autocomplete='new-password';
    document.getElementById('go').textContent='Criar senha e entrar';
  }

  // ---- mostrar/ocultar senha ----
  document.getElementById('eye').onclick=function(){
    var s=document.getElementById('senha');s.type=s.type==='password'?'text':'password';
  };

  // ---- submit ----
  var msg=document.getElementById('msg'), go=document.getElementById('go');
  function show(t,cls){msg.textContent=t;msg.className='msg '+(cls||'');}
  document.getElementById('form').addEventListener('submit',async function(e){
    e.preventDefault();
    var senha=document.getElementById('senha').value;
    if(ativar && senha.length<8){show('A senha precisa ter ao menos 8 caracteres.','err');return;}
    go.disabled=true;show('...');
    try{
      var url=ativar?'/ativar':'/login';
      var body=ativar?{token:token,senha:senha}:{email:document.getElementById('email').value.trim(),senha:senha};
      var r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      var j=await r.json().catch(function(){return {};});
      if(r.ok && j.ok){show('Tudo certo! Entrando…','ok');location.href='/chat';return;}
      show(j.erro||'Não foi possível entrar. Tente de novo.','err');go.disabled=false;
    }catch(err){show('Falha de conexão. Tente de novo.','err');go.disabled=false;}
  });
})();
</script>
</body>
</html>

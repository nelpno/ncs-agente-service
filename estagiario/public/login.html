<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Entrar — NCS</title>
<link rel="stylesheet" href="/assets/app.css">
<style>
  /* tema CLARO por padrão; escuro só se escolhido (data-theme explícito vence o @media do app.css) */
  .theme-toggle{position:fixed;top:16px;right:18px;z-index:60;width:38px;height:38px;border-radius:50%;
    display:grid;place-items:center;font-size:16px;border:1px solid var(--line);background:var(--surface);
    color:var(--muted);box-shadow:var(--shadow-sm);transition:.15s}
  .theme-toggle:hover{color:var(--ink)}
  .login-help.err{color:var(--crit)}
  .login-help.ok{color:var(--good)}
  .login-card{max-width:min(92vw,410px)}
  .field-hidden{position:absolute;width:1px;height:1px;margin:-1px;padding:0;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
</style>
</head>
<body data-screen="login">
  <section class="screen" id="s-login">
    <div class="login-bg">
      <svg viewBox="0 0 400 400" fill="none">
        <g stroke-linecap="round" fill="none">
          <circle cx="200" cy="200" r="170" stroke="var(--olive-brand)" stroke-width="16" stroke-dasharray="620 450"/>
          <circle cx="200" cy="200" r="140" stroke="var(--lime)" stroke-width="16" stroke-dasharray="500 380" stroke-dashoffset="120"/>
          <circle cx="200" cy="200" r="110" stroke="#c9cbb6" stroke-width="14" stroke-dasharray="360 330" stroke-dashoffset="60"/>
          <circle cx="200" cy="200" r="10" fill="var(--olive-brand)"/>
        </g>
      </svg>
    </div>
    <form class="login-card" id="form" autocomplete="on">
      <img class="logo" src="/assets/logo.png" alt="Grupo NCS">
      <h1 id="title">Entrar</h1>
      <p class="sub" id="sub">Acesso interno da equipe do Grupo NCS.</p>
      <div class="field" id="emailField">
        <label for="email">E-mail</label>
        <div class="input"><input type="email" id="email" placeholder="voce@gruponcs.net" autocomplete="username" required></div>
      </div>
      <div class="field">
        <label for="senha" id="senhaLabel">Senha</label>
        <div class="input">
          <input type="password" id="senha" placeholder="Sua senha" autocomplete="current-password" required>
          <button type="button" class="eye" id="eye" title="Mostrar/ocultar" aria-label="Mostrar senha">👁</button>
        </div>
      </div>
      <button type="submit" class="btn-primary" id="go">Entrar</button>
      <div class="login-help" id="msg"></div>
      <p class="login-foot">Uso interno · Grupo NCS · Administração de condomínios</p>
      <p class="login-foot" id="forgot">Esqueceu a senha? Peça um novo link ao administrador.</p>
    </form>
  </section>
  <button class="theme-toggle" id="theme" title="Alternar tema" aria-label="Alternar tema">🌙</button>
<script>
(function(){
  var root=document.documentElement;
  // padrão claro; escuro só se a pessoa escolheu (lembrado)
  root.setAttribute('data-theme', localStorage.getItem('ncs_theme')==='dark'?'dark':'light');
  var tb=document.getElementById('theme');
  function icon(){
    var dark=root.getAttribute('data-theme')==='dark';
    tb.textContent=dark?'☀️':'🌙';
    tb.setAttribute('aria-label',dark?'Mudar para tema claro':'Mudar para tema escuro');
  }
  icon();
  tb.onclick=function(){
    var dark=root.getAttribute('data-theme')==='dark';
    root.setAttribute('data-theme',dark?'light':'dark');
    localStorage.setItem('ncs_theme',dark?'light':'dark');
    icon();
  };

  var token=new URLSearchParams(location.hash.slice(1)).get('t') || new URLSearchParams(location.search).get('t');
  var ativar=!!token;
  if(ativar){
    document.getElementById('title').textContent='Criar sua senha';
    document.getElementById('sub').textContent='Bem-vindo(a)! Defina a senha do seu acesso para continuar.';
    document.getElementById('emailField').classList.add('field-hidden');
    var emailHid=document.getElementById('email');
    emailHid.required=false;
    emailHid.readOnly=true;
    emailHid.tabIndex=-1;
    var forgotEl=document.getElementById('forgot');
    if(forgotEl) forgotEl.style.display='none';
    document.getElementById('senhaLabel').textContent='Escolha uma senha (mínimo 8 caracteres)';
    document.getElementById('senha').placeholder='Crie uma senha';
    document.getElementById('senha').autocomplete='new-password';
    document.getElementById('go').textContent='Criar senha e entrar';
  }

  document.getElementById('eye').onclick=function(){
    var s=document.getElementById('senha');
    var mostrar=s.type==='password';
    s.type=mostrar?'text':'password';
    this.setAttribute('aria-label',mostrar?'Ocultar senha':'Mostrar senha');
  };

  var msg=document.getElementById('msg'), go=document.getElementById('go');
  function show(t,cls){msg.textContent=t;msg.className='login-help '+(cls||'');}
  document.getElementById('form').addEventListener('submit',async function(e){
    e.preventDefault();
    var senha=document.getElementById('senha').value;
    if(ativar && senha.length<8){show('A senha precisa ter ao menos 8 caracteres.','err');return;}
    go.disabled=true;show('…');
    try{
      var url=ativar?'/ativar':'/login';
      var body=ativar?{token:token,senha:senha}:{email:document.getElementById('email').value.trim(),senha:senha};
      var r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      var j=await r.json().catch(function(){return {};});
      if(r.ok && j.ok){show('Tudo certo! Entrando…','ok');location.href='/chat';return;}
      show(j.erro||'Não foi possível entrar. Tente de novo.','err');go.disabled=false;
    }catch(err){show('Falha de conexão. Tente de novo.','err');go.disabled=false;}
  });
})();
</script>
</body>
</html>

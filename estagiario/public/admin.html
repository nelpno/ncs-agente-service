<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Painel — NCS</title>
<link rel="stylesheet" href="/assets/app.css">
<style>
  #tags,#condos{padding:16px 18px 18px}
  .brow{display:flex;align-items:center;gap:12px;margin:13px 0}
  .brow:first-child{margin-top:2px}
  .brow:last-child{margin-bottom:2px}
  .brow .bnm{width:132px;font-size:13px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:none}
  .brow .btrack{flex:1;height:9px;border-radius:999px;background:var(--surface-2);overflow:hidden}
  .brow .bfill{height:100%;border-radius:999px;background:var(--olive);min-width:9px;transition:width .55s cubic-bezier(.2,.7,.2,1)}
  .brow .bn{min-width:24px;text-align:right;font-size:13px;font-weight:700;color:var(--olive-ink);font-variant-numeric:tabular-nums;flex:none}
  .p-empty{color:var(--muted);font-size:13px;padding:6px 2px}
  .addrow{display:flex;gap:8px;flex-wrap:wrap;margin:14px 18px}
  .addrow input,.addrow select{padding:9px 11px;border:1.5px solid var(--line);border-radius:10px;background:var(--surface-2);color:var(--ink);font-size:13.5px;font-family:inherit}
  .addrow input.nm{flex:1;min-width:120px}.addrow input.em{flex:2;min-width:160px}
  .linkbox{margin:12px 18px 16px;background:var(--lime-soft);border:1px dashed var(--olive);border-radius:10px;padding:10px 12px;font-size:13px;display:none;align-items:center;gap:10px}
  .linkbox code{flex:1;word-break:break-all;color:var(--olive-ink)}
  .minibtn{border:1px solid var(--line);background:var(--surface);color:var(--muted);border-radius:8px;padding:5px 10px;cursor:pointer;font-size:12px;margin-left:5px}
  .minibtn:hover{border-color:var(--olive);color:var(--olive)}
  .tt{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;font-size:15px;border:none;background:transparent;color:var(--muted);cursor:pointer}
  .tt:hover{background:var(--surface-2);color:var(--ink)}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  .forbidden{text-align:center;padding:60px 16px;color:var(--muted)}
  .forbidden .ttl{font-size:16px;font-weight:600;color:var(--ink);margin-bottom:14px}
  .load-err{grid-column:1/-1;text-align:center;padding:24px 8px;color:var(--muted)}
  @media(pointer:coarse){
    .minibtn{min-height:40px;padding:10px 14px}
    .tt{min-width:40px;min-height:40px}
  }
</style>
</head>
<body data-screen="painel">
  <section class="screen" id="s-painel">
    <div class="app">
      <div class="drawer-backdrop" id="backdrop"></div>
      <aside class="side">
        <div class="side-brand">
          <img src="/assets/side-logo.png" alt="NCS">
          <span class="wm"><span class="g">Grupo</span><span class="n">NCS</span><span class="role">Estagiário</span></span>
        </div>
        <a class="newchat" href="/chat">💬 Ir para o chat</a>
        <div class="side-lbl">Gestão</div>
        <div class="side-nav">
          <a class="nav-item" href="/chat"><span class="ic">💬</span> Chat</a>
          <a class="nav-item on" href="/admin"><span class="ic">📊</span> Painel de uso</a>
          <a class="nav-item" href="/solicitacoes"><span class="ic">🎟️</span> Solicitações</a>
        </div>
        <div class="side-nav" id="navextra"></div>
        <div style="flex:1"></div>
        <div class="side-user">
          <div class="avatar" id="av">–</div>
          <div class="who"><div class="nm" id="uname">—</div><div class="rl" id="urole"></div></div>
          <button class="gear" id="sair" title="Sair" aria-label="Sair">⎋</button>
        </div>
      </aside>
      <div class="main">
        <div class="topbar">
          <button class="menu-btn" id="menu" title="Menu" aria-label="Menu">☰</button>
          <h2>Painel de uso</h2>
          <div class="grow"></div>
          <span class="pill" id="periodo">…</span>
          <button class="tt" id="theme" title="Tema" aria-label="Alternar tema">🌙</button>
        </div>
        <div class="painel-scroll">
          <div class="painel-inner" id="painelInner">
            <div class="kpis" id="kpis"></div>
            <div class="grid2">
              <div class="card" style="grid-column:1/-1"><div class="card-h"><h3>Uso por pessoa</h3></div><div id="pessoas"></div></div>
              <div class="card"><div class="card-h"><h3>Principais demandas</h3></div><div id="tags"></div></div>
              <div class="card"><div class="card-h"><h3>Condomínios mais ativos</h3></div><div id="condos"></div></div>
              <div class="card" style="grid-column:1/-1">
                <div class="card-h"><h3>Equipe</h3><div class="grow"></div><span class="hint">funcionários entram pelo link de convite</span></div>
                <div id="equipe"></div>
                <div class="addrow">
                  <input class="nm" id="a_nome" placeholder="Nome">
                  <input class="em" id="a_email" type="email" placeholder="e-mail">
                  <select id="a_papel"><option value="funcionario">Funcionário</option><option value="admin">Admin</option></select>
                  <button class="btn-primary" style="width:auto;padding:9px 16px;margin:0" id="addbtn">+ Gerar link de convite</button>
                </div>
                <div class="linkbox" id="linkbox"><code id="linkval"></code><button class="minibtn" id="copybtn">Copiar</button></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
<script>
function el(tag,props,kids){var e=document.createElement(tag);if(props)for(var k in props){if(k==='class')e.className=props[k];else if(k==='text')e.textContent=props[k];else if(k==='style')e.setAttribute('style',props[k]);else if(k==='on')e.onclick=props[k];else e.setAttribute(k,props[k]);}(kids||[]).forEach(function(c){if(c!=null)e.appendChild(typeof c==='object'?c:document.createTextNode(String(c)));});return e;}
function clear(n){while(n.firstChild)n.removeChild(n.firstChild);}
(function(){
  var root=document.documentElement;
  root.setAttribute('data-theme',localStorage.getItem('ncs_theme')==='dark'?'dark':'light');
  var tb=document.getElementById('theme');
  function icon(){tb.textContent=root.getAttribute('data-theme')==='dark'?'☀️':'🌙';}icon();
  tb.onclick=function(){var d=root.getAttribute('data-theme')==='dark';root.setAttribute('data-theme',d?'light':'dark');localStorage.setItem('ncs_theme',d?'light':'dark');icon();};
})();
document.getElementById('sair').onclick=function(){fetch('/logout',{method:'POST',headers:{'Origin':location.origin}}).then(function(){location.href='/login';});};
// menu ☰ (mobile): gaveta da barra lateral
var _app=document.querySelector('.app');
document.getElementById('menu').onclick=function(){_app.classList.toggle('drawer-open');};
document.getElementById('backdrop').onclick=function(){_app.classList.remove('drawer-open');};

var IS_OWNER=false;
var PAPEL={owner:'Dono',admin:'Admin',funcionario:'Funcionário'};
function brl(v){return 'R$ '+(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function quando(iso){if(!iso)return '—';var d=new Date(iso);return d.toLocaleDateString('pt-BR')+' '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});}
function iniciais(n){return (n||'?').split(/\s+/).slice(0,2).map(function(w){return w[0]||'';}).join('').toUpperCase();}

function bars(node,items,key){
  clear(node);
  if(!items.length){node.appendChild(el('div',{class:'p-empty',text:'Sem dados no período.'}));return;}
  var max=Math.max.apply(null,items.map(function(i){return i.n;}))||1;
  items.slice(0,8).forEach(function(i){
    node.appendChild(el('div',{class:'brow'},[
      el('div',{class:'bnm',text:i[key]}),
      el('div',{class:'btrack'},[el('div',{class:'bfill',style:'width:'+Math.round(i.n/max*100)+'%'})]),
      el('div',{class:'bn',text:i.n})
    ]));
  });
}

function showLoadError(){
  var kEl=document.getElementById('kpis');clear(kEl);
  kEl.appendChild(el('div',{class:'load-err'},[
    el('div',{text:'Não foi possível carregar os dados.'}),
    el('button',{class:'btn-primary',style:'width:auto;padding:9px 18px;margin-top:12px',text:'Tentar de novo',on:function(){load();}})
  ]));
}
function showForbidden(){
  document.getElementById('periodo').textContent='Sem permissão';
  var pi=document.getElementById('painelInner');clear(pi);
  pi.appendChild(el('div',{class:'forbidden'},[
    el('div',{class:'ttl',text:'Você não tem acesso a esta área'}),
    el('a',{href:'/chat',class:'btn-ghost',style:'display:inline-block;width:auto;padding:9px 18px;text-decoration:none',text:'Voltar ao chat'})
  ]));
}
function load(){
  fetch('/api/admin/metricas',{headers:{'Accept':'application/json'}}).then(function(r){
    if(r.status===401){location.href='/login';return null;}
    if(r.status===403){showForbidden();return null;}
    return r.json();
  }).then(function(d){
    if(!d)return;
    IS_OWNER=d.isOwner;
    if(d.me){
      document.getElementById('uname').textContent=d.me.nome||'—';document.getElementById('urole').textContent=PAPEL[d.me.papel]||'';document.getElementById('av').textContent=iniciais(d.me.nome);
      var nav=document.getElementById('navextra');clear(nav);
      if(d.me.podeAprovar)nav.appendChild(el('a',{class:'nav-item',href:'/aprovacoes'},[el('span',{class:'ic',text:'✅'}),document.createTextNode(' Aprovações')]));
      if(d.me.podeAprovar||IS_OWNER||d.me.papel==='admin')nav.appendChild(el('a',{class:'nav-item',href:'/pendencias'},[el('span',{class:'ic',text:'📋'}),document.createTextNode(' Pendências')]));
    }
    document.getElementById('periodo').textContent='Desde '+new Date(d.desde).toLocaleDateString('pt-BR');

    var kpis=[['Interações',d.resumo.interacoes]];
    if(IS_OWNER)kpis.push(['Custo estimado',brl(d.resumo.custoBRL)]);
    kpis.push(['Documentos gerados',d.resumo.documentos]);
    kpis.push(['Pessoas ativas',d.resumo.pessoasAtivas]);
    var kEl=document.getElementById('kpis');clear(kEl);
    kpis.forEach(function(x){kEl.appendChild(el('div',{class:'kpi'},[el('div',{class:'k-lbl',text:x[0]}),el('div',{class:'k-val',text:x[1]})]));});

    var pEl=document.getElementById('pessoas');clear(pEl);
    if(!d.pessoas.length){pEl.appendChild(el('div',{class:'p-empty',text:'Ninguém usou ainda no período.'}));}
    else{
      var cols=[{t:'Pessoa'},{t:'Dias ativos',num:1},{t:'Interações',num:1},{t:'Docs',num:1}];
      if(IS_OWNER)cols.push({t:'Custo',num:1});
      cols.push({t:'Última atividade'});
      var htr=el('tr');cols.forEach(function(c){htr.appendChild(el('th',{class:c.num?'num':'',text:c.t}));});
      var tb=el('tbody');
      d.pessoas.forEach(function(p){
        var person=el('td',null,[el('div',{class:'person'},[el('div',{class:'av',text:iniciais(p.nome)}),el('div',null,[document.createTextNode(p.nome||'—'),el('div',{class:'rl',text:PAPEL[p.papel]||''})])])]);
        var cells=[person,el('td',{class:'num',text:p.diasAtivos}),el('td',{class:'num',text:p.interacoes}),el('td',{class:'num',text:p.documentos})];
        if(IS_OWNER)cells.push(el('td',{class:'num',text:brl(p.custoBRL)}));
        cells.push(el('td',{text:quando(p.ultimaAtividade)}));
        tb.appendChild(el('tr',null,cells));
      });
      pEl.appendChild(el('table',null,[el('thead',null,[htr]),tb]));
    }

    bars(document.getElementById('tags'),d.tags,'tag');
    bars(document.getElementById('condos'),d.condominios,'condominio');

    var eEl=document.getElementById('equipe');clear(eEl);
    var eh=el('tr');['Nome','E-mail','Função','Status','Aprovações',''].forEach(function(t){eh.appendChild(el('th',{text:t}));});
    var etb=el('tbody');
    d.equipe.forEach(function(u){
      var pill=!u.ativo?el('span',{class:'pill',text:'Inativo'}):(u.convitePendente?el('span',{class:'chip',text:'Convite pendente'}):el('span',{class:'chip',text:'Ativo'}));
      var acts=el('td',{style:'text-align:right'});
      if(u.papel!=='owner'){
        if(u.convitePendente||!u.ativo)acts.appendChild(el('button',{class:'minibtn',text:'Reenviar link',on:function(){reenviar(u.id);}}));
        acts.appendChild(u.ativo?el('button',{class:'minibtn',text:'Desativar',on:function(){if(!confirm('Desativar o acesso de '+u.nome+'?'))return;setAtivo(u.id,'desativar');}}):el('button',{class:'minibtn',text:'Reativar',on:function(){setAtivo(u.id,'ativar');}}));
      }
      // toggle "pode_aprovar": abre/fecha a aba Aprovações da pessoa (spec Onda 1 §4.4). Só o dono mexe no próprio dono.
      var podeTogglePA=u.papel!=='owner'||IS_OWNER;
      var paCell=el('td');
      if(podeTogglePA){
        paCell.appendChild(el('button',{class:'minibtn',text:u.podeAprovar?'Revogar':'Permitir aprovar',on:function(){setPodeAprovar(u.id,!u.podeAprovar);}}));
      }else{
        paCell.appendChild(el('span',{class:'pill',text:u.podeAprovar?'Sim':'Não'}));
      }
      etb.appendChild(el('tr',null,[el('td',{text:u.nome}),el('td',{text:u.email}),el('td',{text:PAPEL[u.papel]||'—'}),el('td',null,[pill]),paCell,acts]));
    });
    eEl.appendChild(el('table',null,[el('thead',null,[eh]),etb]));
  }).catch(function(){showLoadError();});
}
function showLink(link){document.getElementById('linkval').textContent=link;document.getElementById('linkbox').style.display='flex';}
document.getElementById('copybtn').onclick=function(){var b=this;navigator.clipboard.writeText(document.getElementById('linkval').textContent).then(function(){b.textContent='Copiado!';setTimeout(function(){b.textContent='Copiar';},1500);});};
document.getElementById('addbtn').onclick=function(){
  var nome=document.getElementById('a_nome').value.trim(),email=document.getElementById('a_email').value.trim(),papel=document.getElementById('a_papel').value;
  if(!nome||!email){alert('Preencha nome e e-mail.');return;}
  var btn=this;btn.disabled=true;
  fetch('/api/admin/usuarios',{method:'POST',headers:{'Content-Type':'application/json','Origin':location.origin},body:JSON.stringify({nome:nome,email:email,papel:papel})}).then(function(r){return r.json().then(function(j){return{ok:r.ok,j:j};});}).then(function(x){
    if(!x.ok){alert(x.j.erro||'Não deu para criar.');return;}
    document.getElementById('a_nome').value='';document.getElementById('a_email').value='';showLink(x.j.link);load();
  }).then(function(){btn.disabled=false;},function(){btn.disabled=false;});
};
function reenviar(id){fetch('/api/admin/usuarios/'+id+'/reenviar',{method:'POST',headers:{'Origin':location.origin}}).then(function(r){return r.json().then(function(j){return{ok:r.ok,j:j};});}).then(function(x){if(x.ok)showLink(x.j.link);else alert(x.j.erro||'Falhou.');});}
function setAtivo(id,acao){fetch('/api/admin/usuarios/'+id+'/'+acao,{method:'POST',headers:{'Origin':location.origin}}).then(function(r){return r.json().then(function(j){return{ok:r.ok,j:j};});}).then(function(x){if(x.ok)load();else alert(x.j.erro||'Falhou.');});}
function setPodeAprovar(id,valor){fetch('/api/admin/usuarios/'+id+'/pode_aprovar',{method:'POST',headers:{'Content-Type':'application/json','Origin':location.origin},body:JSON.stringify({valor:valor})}).then(function(r){return r.json().then(function(j){return{ok:r.ok,j:j};});}).then(function(x){if(x.ok)load();else alert(x.j.erro||'Falhou.');});}
load();
</script>
</body>
</html>

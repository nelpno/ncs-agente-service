<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<script>document.documentElement.setAttribute('data-theme',localStorage.getItem('ncs_theme')==='dark'?'dark':'light');</script>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Solicitações — NCS</title>
<link rel="stylesheet" href="/assets/app.css">
<style>
  .tbl-wrap{overflow-x:auto}
  .status-pill{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:700;
    padding:3px 11px;border-radius:999px;border:1px solid var(--line);white-space:nowrap;color:var(--muted)}
  .orig-pill{display:inline-flex;align-items:center;font-size:11px;font-weight:700;letter-spacing:.02em;
    padding:2px 9px;border-radius:999px;border:1px solid var(--line);white-space:nowrap;color:var(--muted)}
  .orig-pill.orig-ana{color:var(--olive);border-color:var(--olive)}
  .acao-btn{border:1.5px solid var(--olive);background:transparent;color:var(--olive);font-family:inherit;
    font-size:12.5px;font-weight:700;padding:5px 12px;border-radius:9px;cursor:pointer;white-space:nowrap}
  .acao-btn:hover{background:var(--olive);color:#fff}
  .acao-btn:disabled{opacity:.55;cursor:default}
  .acao-link{color:var(--olive);font-size:12.5px;font-weight:600;text-decoration:none;white-space:nowrap}
  .acao-link:hover{text-decoration:underline}
  .acao-done{color:var(--muted);font-size:12px;white-space:nowrap}
  .s-empty{color:var(--muted);font-size:13px;padding:16px 18px}
  .forbidden{text-align:center;padding:60px 16px;color:var(--muted)}
  .forbidden .ttl{font-size:16px;font-weight:600;color:var(--ink);margin-bottom:14px}
  .load-err{text-align:center;padding:24px 8px;color:var(--muted)}
  .tt{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;font-size:15px;border:none;background:transparent;color:var(--muted);cursor:pointer}
  .tt:hover{background:var(--surface-2);color:var(--ink)}
  @media(pointer:coarse){.tt{min-width:40px;min-height:40px}}
  .filtros{display:flex;flex-wrap:wrap;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--line)}
  .filtros label{font-size:12px;font-weight:600;color:var(--olive);letter-spacing:.01em;margin-right:6px}
  .filtros select{border:1.5px solid var(--line);background:var(--surface-2);color:var(--ink);
    border-radius:10px;padding:7px 10px;font-family:inherit;font-size:13px}
  .filtros select:focus-visible{border-color:var(--lime)}
  .tipo-counts{display:flex;flex-wrap:wrap;gap:8px;padding:14px 18px 0}
  .tipo-counts .pill{cursor:default}
  .tipo-counts .pill b{color:var(--ink);font-weight:700}
</style>
</head>
<body data-screen="painel">
  <section class="screen" id="s-painel">
    <div class="app">
      <div class="drawer-backdrop" id="backdrop"></div>
      <aside class="side">
        <div class="side-brand">
          <img src="/assets/side-logo.png" alt="NCS">
          <span class="wm"><span class="g">Grupo</span><span class="n">NCS</span><span class="role">Estagiário</span></span>
        </div>
        <a class="newchat" href="/chat">💬 Ir para o chat</a>
        <div class="side-lbl">Gestão</div>
        <div class="side-nav" id="navgestao"></div>
        <div style="flex:1"></div>
        <div class="side-user">
          <div class="avatar" id="av">–</div>
          <div class="who"><div class="nm" id="uname">—</div><div class="rl" id="urole"></div></div>
          <button class="gear" id="sair" title="Sair" aria-label="Sair">⎋</button>
        </div>
      </aside>
      <div class="main">
        <div class="topbar">
          <button class="menu-btn" id="menu" title="Menu" aria-label="Menu">☰</button>
          <h2>Solicitações</h2>
          <div class="grow"></div>
          <span class="pill" id="periodo">…</span>
          <button class="tt" id="theme" title="Tema" aria-label="Alternar tema">🌙</button>
        </div>
        <div class="painel-scroll">
          <div class="painel-inner" id="painelInner">
            <div class="card" style="grid-column:1/-1">
              <div class="card-h"><h3>Fila de solicitações</h3><div class="grow"></div><span class="hint" id="fonteHint">só leitura</span></div>
              <div class="tipo-counts" id="tipoCounts"></div>
              <div class="filtros">
                <span><label for="fTipo">Tipo</label><select id="fTipo"><option value="">Todos</option></select></span>
                <span><label for="fStatus">Status</label><select id="fStatus"><option value="">Todos</option></select></span>
              </div>
              <div class="tbl-wrap" id="lista"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
<script>
function el(tag,props,kids){var e=document.createElement(tag);if(props)for(var k in props){if(k==='class')e.className=props[k];else if(k==='text')e.textContent=props[k];else if(k==='style')e.setAttribute('style',props[k]);else if(k==='on')e.onclick=props[k];else e.setAttribute(k,props[k]);}(kids||[]).forEach(function(c){if(c!=null)e.appendChild(typeof c==='object'?c:document.createTextNode(String(c)));});return e;}
function clear(n){while(n.firstChild)n.removeChild(n.firstChild);}
(function(){
  var root=document.documentElement;
  var tb=document.getElementById('theme');
  function icon(){tb.textContent=root.getAttribute('data-theme')==='dark'?'☀️':'🌙';}icon();
  tb.onclick=function(){var d=root.getAttribute('data-theme')==='dark';root.setAttribute('data-theme',d?'light':'dark');localStorage.setItem('ncs_theme',d?'light':'dark');icon();};
})();
document.getElementById('sair').onclick=function(){fetch('/logout',{method:'POST',headers:{'Origin':location.origin}}).then(function(){location.href='/login';});};
var _app=document.querySelector('.app');
document.getElementById('menu').onclick=function(){_app.classList.toggle('drawer-open');};
document.getElementById('backdrop').onclick=function(){_app.classList.remove('drawer-open');};

var PAPEL={owner:'Dono',admin:'Admin',funcionario:'Funcionário'};
// rótulos amigáveis pro tipo (mesma triagem de agente-service/src/espelho.mjs); tipo fora do mapa mostra cru
var TIPO_LBL={
  titularidade:'Titularidade', cadastro_dependente:'Cadastro dependente', cadastro_inquilino:'Cadastro inquilino',
  mudanca:'Mudança', cnd:'CND', boleto_2via:'Boleto 2ª via', negociacao:'Negociação', clube:'Clube de vantagens',
  evento:'Evento', portaria_acesso:'Portaria/acesso', ocorrencia:'Ocorrência', cadastro:'Cadastro', outro:'Outro'
};
function tipoLbl(t){return TIPO_LBL[t]||t||'—';}
// origem da linha: 'ana' (a Ana carimbou, F1) x 'octadesk' (espelho passivo). null/desconhecido = octadesk (default da migração).
var ORIGEM_LBL={ana:'Ana',octadesk:'Octadesk'};
function origemLbl(o){return ORIGEM_LBL[o]||o||'Octadesk';}
function statusLbl(s){if(!s)return '—';return s.charAt(0).toUpperCase()+s.slice(1);}
function iniciais(n){return (n||'?').split(/\s+/).slice(0,2).map(function(w){return w[0]||'';}).join('').toUpperCase();}
function quando(iso){if(!iso)return '—';var d=new Date(iso);return d.toLocaleDateString('pt-BR')+' '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});}
// fecha = qualquer desfecho (resolvida na aprovação/manual, rejeitada, expirada) — a linha não é mais acionável
function isResolvida(s){return /resolv|fechad|closed|rejeitad|expirad/i.test(s||'');}
function doneLbl(n){
  var s=n.status||'';
  var base=/rejeitad/i.test(s)?'✕ Rejeitada':/expirad/i.test(s)?'⌛ Expirada':'✓ Resolvida';
  return base+(n.resolvido_por?' · '+n.resolvido_por:'');
}
// Célula de Ação (F2). Só linhas da ANA são acionáveis: a espelhada do Octa tem o status vindo de lá e o
// worker do espelho sobrescreveria qualquer mudança nossa. Escrita-ERP (tem draft_id) fecha na aprovação
// → leva ao card; human-process (ocorrência/mudança/titularidade) fecha no botão Resolver.
function acaoCell(n){
  if(n.origem!=='ana') return el('td',{class:'acao-done',text:'—'});
  if(isResolvida(n.status)) return el('td',null,[el('span',{class:'acao-done',text:doneLbl(n)})]);
  if(n.draft_id) return el('td',null,[el('a',{class:'acao-link',href:'/aprovacoes',text:'Ver nas Aprovações →'})]);
  return el('td',null,[el('button',{class:'acao-btn',on:function(){resolver(n.id,this);}},['Resolver'])]);
}
function resolver(id,btn){
  if(!id)return;
  if(btn){btn.disabled=true;btn.textContent='…';}
  fetch('/api/solicitacoes/'+encodeURIComponent(id)+'/resolver',{method:'POST',headers:{'Content-Type':'application/json','Origin':location.origin}})
    .then(function(r){return r.ok?r.json():null;})
    .then(function(d){if(d&&d.ok){load();}else{if(btn){btn.disabled=false;btn.textContent='Tente de novo';}}})
    .catch(function(){if(btn){btn.disabled=false;btn.textContent='Tente de novo';}});
}

fetch('/api/me',{headers:{'Accept':'application/json'}}).then(function(r){return r.ok?r.json():null;}).then(function(me){
  if(!me)return;
  document.getElementById('uname').textContent=me.nome||'—';
  document.getElementById('urole').textContent=PAPEL[me.papel]||'';
  document.getElementById('av').textContent=iniciais(me.nome);
  var nav=document.getElementById('navgestao');clear(nav);
  nav.appendChild(el('a',{class:'nav-item',href:'/chat'},[el('span',{class:'ic',text:'💬'}),document.createTextNode(' Chat')]));
  if(me.papel==='owner'||me.papel==='admin'){
    nav.appendChild(el('a',{class:'nav-item',href:'/admin'},[el('span',{class:'ic',text:'📊'}),document.createTextNode(' Painel de uso')]));
    nav.appendChild(el('a',{class:'nav-item on',href:'/solicitacoes'},[el('span',{class:'ic',text:'🎟️'}),document.createTextNode(' Solicitações')]));
  }
  if(me.podeAprovar)nav.appendChild(el('a',{class:'nav-item',href:'/aprovacoes'},[el('span',{class:'ic',text:'✅'}),document.createTextNode(' Aprovações')]));
  if(me.podeAprovar||me.papel==='owner'||me.papel==='admin')nav.appendChild(el('a',{class:'nav-item',href:'/pendencias'},[el('span',{class:'ic',text:'📋'}),document.createTextNode(' Pendências')]));
}).catch(function(){});

function showForbidden(){
  document.getElementById('periodo').textContent='Sem permissão';
  var pi=document.getElementById('painelInner');clear(pi);
  pi.appendChild(el('div',{class:'forbidden'},[
    el('div',{class:'ttl',text:'Você não tem acesso a esta área'}),
    el('a',{href:'/chat',class:'btn-ghost',style:'display:inline-block;width:auto;padding:9px 18px;text-decoration:none',text:'Voltar ao chat'})
  ]));
}
function showLoadError(){
  var l=document.getElementById('lista');clear(l);
  l.appendChild(el('div',{class:'load-err'},[
    el('div',{text:'Não foi possível carregar as solicitações.'}),
    el('button',{class:'btn-primary',style:'width:auto;padding:9px 18px;margin-top:12px',text:'Tentar de novo',on:function(){load();}})
  ]));
}

var TODOS=[]; // cache do último fetch (sem filtro) — filtro/contagem é tudo client-side sobre esse array

function popularFiltros(itens){
  var contTipo={},contStatus={},contOrig={ana:0,octadesk:0};
  itens.forEach(function(n){
    if(n.tipo)contTipo[n.tipo]=(contTipo[n.tipo]||0)+1;
    if(n.status)contStatus[n.status]=(contStatus[n.status]||0)+1;
    contOrig[n.origem==='ana'?'ana':'octadesk']++;
  });
  // header honesto: enquanto só houver espelho, "fonte é o Octadesk"; quando a Ana já carimba (F1), mostra a divisão.
  var fh=document.getElementById('fonteHint');
  if(fh)fh.textContent=contOrig.ana>0
    ? 'só leitura · Octadesk '+contOrig.octadesk+' · Ana '+contOrig.ana
    : 'só leitura · espelho do Octadesk';
  var tc=document.getElementById('tipoCounts');clear(tc);
  Object.keys(contTipo).sort(function(a,b){return contTipo[b]-contTipo[a];}).forEach(function(t){
    tc.appendChild(el('span',{class:'pill'},[document.createTextNode(tipoLbl(t)+' '),el('b',{text:String(contTipo[t])})]));
  });
  var selTipo=document.getElementById('fTipo'),curTipo=selTipo.value;
  clear(selTipo);selTipo.appendChild(el('option',{value:'',text:'Todos'}));
  Object.keys(contTipo).sort(function(a,b){return contTipo[b]-contTipo[a];}).forEach(function(t){
    selTipo.appendChild(el('option',{value:t,text:tipoLbl(t)+' ('+contTipo[t]+')'}));
  });
  selTipo.value=curTipo||'';
  var selStatus=document.getElementById('fStatus'),curStatus=selStatus.value;
  clear(selStatus);selStatus.appendChild(el('option',{value:'',text:'Todos'}));
  Object.keys(contStatus).sort(function(a,b){return contStatus[b]-contStatus[a];}).forEach(function(s){
    selStatus.appendChild(el('option',{value:s,text:statusLbl(s)+' ('+contStatus[s]+')'}));
  });
  selStatus.value=curStatus||'';
}

function render(itens){
  var l=document.getElementById('lista');clear(l);
  document.getElementById('periodo').textContent=itens.length+(itens.length===1?' solicitação':' solicitações');
  if(!itens.length){l.appendChild(el('div',{class:'s-empty',text:'Nenhuma solicitação com esse filtro.'}));return;}
  var cols=['Protocolo','Origem','Tipo','Setor','Assunto','Status','Solicitante','Data','Ação'];
  var htr=el('tr');cols.forEach(function(c){htr.appendChild(el('th',{text:c}));});
  var tb=el('tbody');
  itens.forEach(function(n){
    var pill=el('span',{class:'status-pill',text:statusLbl(n.status)});
    var orig=n.origem==='ana'?'ana':'octadesk';
    var origBadge=el('span',{class:'orig-pill'+(orig==='ana'?' orig-ana':''),text:origemLbl(orig)});
    tb.appendChild(el('tr',null,[
      el('td',{text:n.protocolo_ncs||'—'}),
      el('td',null,[origBadge]),
      el('td',{text:tipoLbl(n.tipo)}),
      el('td',{text:n.setor||'—'}),
      el('td',{text:n.assunto||'—'}),
      el('td',null,[pill]),
      el('td',{text:n.requester||'—'}),
      el('td',{text:quando(n.criado_em)}),
      acaoCell(n),
    ]));
  });
  l.appendChild(el('table',null,[el('thead',null,[htr]),tb]));
}

function aplicarFiltro(){
  var t=document.getElementById('fTipo').value,s=document.getElementById('fStatus').value;
  var filtrados=TODOS.filter(function(n){return (!t||n.tipo===t)&&(!s||n.status===s);});
  render(filtrados);
}
document.getElementById('fTipo').onchange=aplicarFiltro;
document.getElementById('fStatus').onchange=aplicarFiltro;

function load(){
  fetch('/api/solicitacoes',{headers:{'Accept':'application/json'}}).then(function(r){
    if(r.status===401){location.href='/login';return null;}
    if(r.status===403){showForbidden();return null;}
    return r.json();
  }).then(function(d){
    if(!d)return;
    TODOS=d.itens||[];
    popularFiltros(TODOS);
    aplicarFiltro();
  }).catch(function(){showLoadError();});
}
load();
</script>
</body>
</html>

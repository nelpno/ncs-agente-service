# ⚠️ VESTIGIAL — este arquivo NÃO é o que sobe no VPS. Editar AQUI não muda produção.
# Foi ele que enganou uma vez: a linha do REDIS_URL existia aqui, os scripts de deploy nunca
# a definiam, e o Estagiário rodou meses em memória, perdendo a conversa da equipe a cada
# redeploy.
#
# 👉 Mudou env/serviço do ncs-chat? Edite deploy/ncs-chat.stack.mjs — FONTE ÚNICA, importada
# pelos dois scripts (.tmp/deploy_chat_ncs.mjs e .tmp/deploy_apps_ncs.mjs) e travada por
# test/test_deploy_chat_stack.mjs no gate do CI. Não existe mais "mexer nos dois".
services:
  # Chat NCS — assistente interno (mesma imagem da Ana, entrypoint do estagiário).
  # Stack SEPARADA: deploy independente, não recria o container da Ana. Túnel/código próprios.
  ncs-chat:
    image: ghcr.io/nelpno/ncs-agente-service:latest
    container_name: ncs-chat
    restart: unless-stopped
    pull_policy: always
    command: ["node", "estagiario/server.mjs"]
    environment:
      - PORT=8090
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_BASE_URL=${OPENROUTER_BASE_URL:-https://generativelanguage.googleapis.com/v1beta/openai}
      - AGENT_MODEL=${AGENT_MODEL:-gemini-3-flash-preview}
      - CHAT_PASSCODE=${CHAT_PASSCODE}
      - CHROME_PATH=/usr/bin/chromium-browser
      # Superlógica (somente leitura): cadastro do condomínio + morador
      - SUPERLOGICA_BASE_URL=${SUPERLOGICA_BASE_URL:-https://api.superlogica.net/v2/condor}
      - SUPERLOGICA_APP_TOKEN=${SUPERLOGICA_APP_TOKEN}
      - SUPERLOGICA_ACCESS_TOKEN=${SUPERLOGICA_ACCESS_TOKEN}
      # Gemini (Fase 2 multimodal): visão/OCR de anexos (foto da ocorrência, print, PDF)
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      # Redis (memória persistente de sessão — opcional; fallback in-memory se ausente)
      - REDIS_URL=${REDIS_URL:-}
      - SESSION_TTL_S=${SESSION_TTL_S:-172800}
    expose:
      - "8090"
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  # Cloudflare Tunnel próprio do Chat NCS (token do túnel ncs-chat).
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: ncs-chat-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - ncs-chat
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
